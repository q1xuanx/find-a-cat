<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find The Cat 🐱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            min-height: 100vh;
        }

        .board {
            display: inline-block;
            padding: 10px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .cell {
            width: 45px;
            height: 45px;
            margin: 4px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .cell:hover {
            transform: scale(1.1);
        }

        .clicked {
            background-color: #ffc107 !important;
        }

        .header {
            font-weight: bold;
            font-size: 28px;
        }

        .level-badge {
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container text-center mt-5">
    <div class="header mb-3">🐱 Find The Cat Game</div>
    <div class="mb-3">
        <span class="badge bg-primary level-badge" id="level">Level: 1</span>
    </div>

    <button class="btn btn-success mb-3" onclick="startGame()">Start Game</button>

    <div id="board" class="board"></div>
</div>

<script>
    let boardSize = 0;
    let currentLevel = 1;
    let url = "http://localhost:8080"

    async function startGame() {
        currentLevel = 1;
        updateLevel();
        await drawBoard();
    }

    function updateLevel() {
        document.getElementById("level").innerText = "Level: " + currentLevel;
    }

    async function drawBoard() {
        const res = await fetch(url + '/cat/draw-board');
        boardSize = await res.json();

        renderBoard(boardSize);
    }

    function renderBoard(n) {
        const board = document.getElementById("board");
        board.innerHTML = "";

        for (let i = 0; i < n; i++) {
            const row = document.createElement("div");
            row.className = "d-flex justify-content-center";

            for (let j = 0; j < n; j++) {
                const cell = document.createElement("button");
                cell.className = "btn btn-outline-dark cell";

                cell.onclick = () => handleClick(i, j, cell);

                row.appendChild(cell);
            }

            board.appendChild(row);
        }
    }

    async function handleClick(x, y, cell) {
        cell.classList.add("clicked");

        const res = await fetch(url + '/cat/check-result', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ x, y })
        });

        const data = await res.json();

        if (!data.status) {
            showToast("❌ " + data.message, "danger");
        } else {
            if (currentLevel === 3) {
                showBigWin();
                currentLevel = 1;
            } else {
                currentLevel++;
                showToast("✅ " + data.message, "success");
            }

            updateLevel();
            await drawBoard();
        }
    }

    function showToast(message, type) {
        const toast = document.createElement("div");
        toast.className = `alert alert-${type} position-fixed top-0 end-0 m-3`;
        toast.innerText = message;

        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 2000);
    }

    function showBigWin() {
        const overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.top = "0";
        overlay.style.left = "0";
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.background = "rgba(0,0,0,0.8)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        overlay.style.zIndex = "9999";

        const text = document.createElement("div");
        text.style.color = "white";
        text.style.fontSize = "40px";
        text.style.fontWeight = "bold";
        text.innerText = "🎉 CHÚC MỪNG!!! BẠN ĐÃ THẮNG!!! 🐱";

        overlay.appendChild(text);
        document.body.appendChild(overlay);

        setTimeout(() => {
            overlay.remove();
        }, 3000);
    }
</script>

</body>
</html>
